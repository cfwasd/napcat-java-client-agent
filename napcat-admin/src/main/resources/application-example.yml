server:
  port: 8080

napcat:
  adapter:
    type: websocket-client
    websocket-client:
      url: ws://127.0.0.1:3001  # 请修改为你的 NapCat WebSocket 地址
      token: ""  # 请修改为你的 NapCat Token

  bot:
    self-id: 0  # 请修改为你的机器人 QQ 号
    command-prefix: ""
    ignore-self-message: true
    at-me-trigger: true
    wake-words:
      - emiya
      - 小助手

  llm:
    provider: openai
    openai:
      base-url: http://127.0.0.1:12345/v1  # 请修改为你的 LLM API 地址
      api-key: ${OPENAI_API_KEY:your-api-key-here}  # 建议使用环境变量
      model: qwen3.5-4b  # 请修改为你使用的模型名称
  #      base-url: https://api.deepseek.com
  #      api-key: ${OPENAI_API_KEY:your-deepseek-api-key}
  #      model: deepseek-v4-flash

  agent:
    enabled: true
    max-react-rounds: 5
    system-prompt: "你是一个有用的 QQ 机器人助手。"
    show-tool-process: true          # 将工具调用过程发送到群聊
    session-ttl: 7200  # 延长到 2 小时
    max-history-messages: 40  # 保持最近 40 条消息
    builtin:
      web-search:
        enabled: true
        instance: http://127.0.0.1:18080  # 请修改为你的 SearxNG 地址
        result-count: 5

logging:
  level:
    com.napcat: INFO  # 生产环境建议使用 INFO 级别
